// Hand-rolled minimal REST client using native fetch() — no external script/library dependency,
// so nothing can hang the page waiting on a blocked third-party script.
function makeSupabaseRestClient(url, key){
  function queryBuilder(table){
    const params = new URLSearchParams();
    return {
      select(cols){ params.set('select', cols || '*'); return this; },
      eq(col, val){ params.append(col, `eq.${val}`); return this; },
      async maybeSingle(){
        try{
          const res = await fetch(`${url}/rest/v1/${table}?${params.toString()}`, {
            headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
          });
          if(!res.ok) return { data:null, error:new Error('HTTP '+res.status) };
          const arr = await res.json();
          return { data: (arr && arr.length) ? arr[0] : null, error:null };

      async upsert(row){

              'Prefer':'resolution=merge-duplicates'

          });
          if(!res.ok) return { error:new Error('HTTP '+res.status) };
          return { error:null };
        }catch(e){ return { error:e }; }
      }
    };
  }
  return { from(table){ return queryBuilder(table); } };
}

/* ---------- persistence ---------- */
async function loadState(){
  for(let attempt=0; attempt<3; attempt++){
    try{
      const { data, error } = await supabase.from('hero_volley_state').select('data').eq('id', STATE_ROW_ID).maybeSingle();
      if(error) throw error;
      if(data && data.data){ state = data.data; }
      break;
    }catch(e){ console.warn('Load attempt failed, retrying...', e); await new Promise(r=>setTimeout(r,400)); }
  }
  if(!state){ state = defaultState(); await persist(); }
  if(state.eventName==='Hero Volley Montauk'){ state.eventName = 'Hero Volley Pro-Am'; }
  if(!state.eventLocation){ state.eventLocation = 'Montauk, NY'; }
  if(!state.qrLink){ state.qrLink = 'https://thesandclubacademy.com'; }
  if(!state.poolNames){ state.poolNames = { am1:'Pool 1', am2:'Pool 2', pro:'Pro Pool' }; }
  if(!state.proInterludes){
    state.proInterludes = [
      { id:'pi-1', type:'contest', name:'Game / Contest', time:'', afterRound:1 },
      { id:'pi-2', type:'contest', name:'Game / Contest', time:'', afterRound:2 },
      { id:'pi-lunch', type:'lunch', name:'Lunch', time:'12:30 PM', afterRound:3 },
      { id:'pi-3', type:'contest', name:'Game / Contest', time:'', afterRound:3 },
      { id:'pi-4', type:'contest', name:'Game / Contest', time:'', afterRound:4 },
    ];
  }
  // fix a seeding bug from an earlier version: SF1 (seed 1) should face the 4v5 winner, SF2 (seed 2) the 3v6 winner
  const sf1 = state.playoffs && state.playoffs.find(p=>p.id==='proSF1');
  const sf2 = state.playoffs && state.playoffs.find(p=>p.id==='proSF2');
  if(sf1 && sf1.seedB && sf1.seedB.of==='proQF1'){ sf1.seedB = {type:'winner',of:'proQF2'}; sf1.label='Pro Semifinal (1 vs 4/5)'; }
  if(sf2 && sf2.seedB && sf2.seedB.of==='proQF2'){ sf2.seedB = {type:'winner',of:'proQF1'}; sf2.label='Pro Semifinal (2 vs 3/6)'; }
  // scoring format: QF/SF play to 25 win-by-2 cap 30 (single score, same widget as pool play); Final is best of 3 (21/21/15)
  ['proQF1','proQF2','proSF1','proSF2'].forEach(id=>{
    const m = state.playoffs && state.playoffs.find(p=>p.id===id);
    if(m){ m.format='single'; m.cap=30; m.target=25; m.winBy=2; }
  });
  const fin = state.playoffs && state.playoffs.find(p=>p.id==='proFinal');
  if(fin){ fin.format='bo3'; fin.setCaps = [21,21,15]; if(!fin.sets) fin.sets=[{a:0,b:0},{a:0,b:0},{a:0,b:0}]; }
  ['amSemi1','amSemi2','amFinal'].forEach(id=>{
    const m = state.playoffs && state.playoffs.find(p=>p.id===id);
    if(m && !m.cap){ m.cap=21; m.target=21; m.winBy=1; }
  });
  [...state.matches, ...state.playoffs].forEach(m=>{ if(typeof m.locked==='undefined') m.locked=false; });
  ['am1','am2','pro'].forEach(poolKey=>{

      while(t.roster.length < 10) t.roster.push({ name:'', instagram:'' });

let consecutiveSaveFailures = 0;
let suppressNextRealtimeEcho = false;
let pendingSaveResolvers = [];
let lastSaveCompletedAt = 0;
function persist(){
  clearTimeout(saveTimer);
  return new Promise(resolve=>{
    pendingSaveResolvers.push(resolve);
    saveTimer = setTimeout(async ()=>{
      let ok = false;
      for(let attempt=0; attempt<3 && !ok; attempt++){
        try{
          suppressNextRealtimeEcho = true;
          const { error } = await supabase.from('hero_volley_state').upsert({ id: STATE_ROW_ID, data: state, updated_at: new Date().toISOString() });
          if(error) throw error;
          ok = true; consecutiveSaveFailures = 0;
        }
        catch(e){ if(attempt<2) await new Promise(r=>setTimeout(r,400)); else { consecutiveSaveFailures++; console.warn('Save failed after retries', e); } }
      }
      saveTimer = null;
      lastSaveCompletedAt = Date.now();
      const resolvers = pendingSaveResolvers; pendingSaveResolvers = [];
      resolvers.forEach(r=>r(ok));
    }, 300);
  });
}
async function saveAndRender(){ await persist(); render(); }
let flashSaveTimer = null;
function flashSaved(card, persistPromise){
  let badge = card.querySelector('.save-indicator');
  if(!badge){
    badge = document.createElement('div');
    badge.className = 'save-indicator';
    card.appendChild(badge);
  }
  badge.classList.remove('fade-out');
  badge.style.opacity = '1';
  badge.style.background = 'rgba(31,163,92,.95)';
  badge.textContent = 'Saving\u2026';
  clearTimeout(flashSaveTimer);
  persistPromise.then(ok=>{
    if(ok){
      badge.textContent = '\u2713 Saved';
      badge.style.background = 'rgba(31,163,92,.95)';
      flashSaveTimer = setTimeout(()=>{ badge.classList.add('fade-out'); }, 900);
    } else {
      badge.textContent = '\u26a0 Not saved \u2014 check connection';
      badge.style.background = '#C5461F';
      flashSaveTimer = setTimeout(()=>{ badge.classList.add('fade-out'); }, 4000);
    }
  });
}

/* ---------- helpers ---------- */
function allTeams(){ return [...state.teams.am1, ...state.teams.am2, ...state.teams.pro]; }
function findTeam(id){ return allTeams().find(t=>t.id===id) || null; }
function findMatch(id){ return state.matches.find(m=>m.id===id) || state.playoffs.find(m=>m.id===id) || null; }

function poolStandings(poolKey){
  const teams = state.teams[poolKey];
  const rows = teams.map(t=>({team:t, w:0,l:0,pf:0,pa:0,played:0}));
  state.matches.filter(m=>m.pool===poolKey && m.completed).forEach(m=>{
    const ra = rows.find(r=>r.team.id===m.teamA), rb = rows.find(r=>r.team.id===m.teamB);
    if(!ra||!rb) return;
    ra.pf+=m.scoreA; ra.pa+=m.scoreB; rb.pf+=m.scoreB; rb.pa+=m.scoreA;
    ra.played++; rb.played++;
    if(m.scoreA>m.scoreB){ra.w++; rb.l++;} else if(m.scoreB>m.scoreA){rb.w++; ra.l++;}
  });
  rows.forEach(r=> r.diff = r.pf-r.pa );
  rows.sort((a,b)=> b.w-a.w || b.diff-a.diff || b.pf-a.pf );
  return rows;
}

function matchWinnerTeamId(m){
  if(!m || !m.completed) return null;
  if(m.format==='bo3'){
    let sa=0,sb=0;
    (m.sets||[]).forEach(s=>{ if(s.a>s.b) sa++; else if(s.b>s.a) sb++; });
    if(sa>=2) return m.teamA_resolved||null;
    if(sb>=2) return m.teamB_resolved||null;
    return null;
  }
  if(m.scoreA>m.scoreB) return m.teamA_resolved||null;
  if(m.scoreB>m.scoreA) return m.teamB_resolved||null;
  return null;
}

function ordinal(n){ return {1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th',6:'6th'}[n] || (n+'th'); }
function seedPlaceholder(seed){
  if(!seed) return 'TBD';
  if(seed.type==='pro') return `${ordinal(seed.rank)} place of ${poolLabel('pro')}`;
  if(seed.type==='am1') return `${ordinal(seed.rank)} place of ${poolLabel('am1')}`;
  if(seed.type==='am2') return `${ordinal(seed.rank)} place of ${poolLabel('am2')}`;
  if(seed.type==='winner'){
    if(seed.of==='amFinal') return '1st place of Amateur Pools';
    const src = state.playoffs.find(p=>p.id===seed.of);
    return src ? `Winner of ${src.label}` : 'TBD';
  }
  return 'TBD';
}
function nextRoundNote(matchId){
  const nxt = state.playoffs.find(p=>
    (p.seedA && p.seedA.type==='winner' && p.seedA.of===matchId) ||
    (p.seedB && p.seedB.type==='winner' && p.seedB.of===matchId)
  );
  if(!nxt) return '';
  const opponentSeed = (nxt.seedA && nxt.seedA.type==='winner' && nxt.seedA.of===matchId) ? nxt.seedB : nxt.seedA;
  return `Winner plays ${seedPlaceholder(opponentSeed)}`;
}
function poolComplete(poolKey){
  const ms = state.matches.filter(m=>m.pool===poolKey);
  return ms.length>0 && ms.every(m=>m.completed);
}
function resolveSeed(seed){
  if(!seed) return null;
  if(seed.type==='am1' || seed.type==='am2' || seed.type==='pro'){
    if(!poolComplete(seed.type)) return null;
    const st = poolStandings(seed.type);
    return st[seed.rank-1] ? st[seed.rank-1].team : null;
  }
  if(seed.type==='winner'){
    const m = state.playoffs.find(p=>p.id===seed.of);
    if(!m) return null;
    resolvePlayoffTeams(m);
    const winId = matchWinnerTeamId(m);
    return winId ? findTeam(winId) : null;
  }
  return null;
}
function resolvePlayoffTeams(m){
  const ta = resolveSeed(m.seedA), tb = resolveSeed(m.seedB);
  m.teamA_resolved = ta ? ta.id : null;
  m.teamB_resolved = tb ? tb.id : null;
}

  courts.forEach(c=>byCourt[c]=null);
  all.forEach(m=>{

    if(!m.completed && !byCourt[court]) byCourt[court]=m;

    ${work?`<div class="scorecard-note">${work}</div>`:''}
    ${isPlayoff&&nextRoundNote(m.id)?`<div class="scorecard-note">${esc(nextRoundNote(m.id))}</div>`:''}
    <label class="scorecard-final-toggle"><input type="checkbox" class="inline-complete-toggle" data-mid="${m.id}" ${m.completed?'checked':''} ${m.locked?'disabled':''}> Mark Final</label>

function hexLuminance(hex){
  hex = (hex||'#888888').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const lin = c => c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
}
function contrastTextColor(hex){ return hexLuminance(hex) > 0.45 ? '#0A2E30' : '#ffffff'; }
function teamEditorCard(t, pool){
  const textColor = contrastTextColor(t.color);

    });
    card.querySelectorAll('.te-player-ig').forEach(inp=>{
      inp.oninput = e=>{ if(!teamEditUnlocked) return; t.roster[+inp.dataset.idx].instagram=e.target.value; flashSaved(card, persist()); };
    });
  });

  const titleTap = document.getElementById('teamPageTitle'); if(titleTap) titleTap.onclick = handleTeamHeaderTap;

    let snapshotName = t.name;

      const nameField = card.querySelector('.te-name');
      if(nameField) snapshotName = nameField.value;

      card.querySelectorAll('.te-player-ig').forEach(inp=>{ snapshotRoster[+inp.dataset.idx].instagram = inp.value; });

    snapshotRoster.forEach((p,i)=>{ t.roster[i].name = p.name; t.roster[i].instagram = p.instagram; });

    teamSaveBtn.disabled = true;

    if(ok){
      render();

      const freshCard = document.querySelector('.team-edit-card');

        const nf = freshCard.querySelector('.te-name'); if(nf) nf.value = snapshotName;

      clearAllScores();
      await saveAndRender();

  if(undoBtn) undoBtn.onclick = async ()=>{

  };

function clearAllScores(){
  lastScoreClearBackup = {
    matches: state.matches.map(m => ({ id:m.id, scoreA:m.scoreA, scoreB:m.scoreB, completed:m.completed, locked:m.locked })),
    playoffs: state.playoffs.map(m => ({ id:m.id, scoreA:m.scoreA, scoreB:m.scoreB, completed:m.completed, locked:m.locked, sets: JSON.parse(JSON.stringify(m.sets||[])) }))
  };
  state.matches.forEach(m=>{ m.scoreA=0; m.scoreB=0; m.completed=false; m.locked=false; });
  state.playoffs.forEach(m=>{
    m.scoreA=0; m.scoreB=0; m.completed=false; m.locked=false;
    if(m.sets) m.sets = [{a:0,b:0},{a:0,b:0},{a:0,b:0}];
  });
}
function undoClearScores(){
  if(!lastScoreClearBackup) return;
  lastScoreClearBackup.matches.forEach(b=>{ const m=state.matches.find(x=>x.id===b.id); if(m){ m.scoreA=b.scoreA; m.scoreB=b.scoreB; m.completed=b.completed; m.locked=b.locked; } });
  lastScoreClearBackup.playoffs.forEach(b=>{ const m=state.playoffs.find(x=>x.id===b.id); if(m){ m.scoreA=b.scoreA; m.scoreB=b.scoreB; m.completed=b.completed; m.locked=b.locked; if(b.sets) m.sets=b.sets; } });
  lastScoreClearBackup = null;
}

function openColorModal(teamId){
  const t = findTeam(teamId);
  if(!t) return;
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px;padding:22px;width:100%;max-width:320px;text-align:center;';
  box.innerHTML = `
    <h3 style="font-size:16px;margin-bottom:14px;">${esc(t.name)}'s color</h3>
    <input type="color" id="colorPickerInput" value="${t.color}" style="width:100%; height:54px; border:1px solid var(--line); border-radius:10px; margin-bottom:14px; padding:2px;">
    <div class="swatch-row" style="justify-content:center; margin-bottom:16px;">
      ${PRESET_COLORS.map(c=>`<button type="button" class="preset-swatch" data-color="${c}" style="background:${c}${c.toLowerCase()===t.color.toLowerCase()?';box-shadow:0 0 0 2px #fff,0 0 0 4px var(--deep)':''}"></button>`).join('')}
    </div>
    <button class="btn ghost" id="colorClose" style="width:100%;">Close</button>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  box.querySelector('#colorPickerInput').oninput = e=>{ t.color = e.target.value; persist(); };
  box.querySelector('#colorPickerInput').onchange = ()=> saveAndRender();
  box.querySelectorAll('.preset-swatch').forEach(sw=>{
    sw.onclick = ()=>{ t.color = sw.dataset.color; saveAndRender(); overlay.remove(); };
  });
  box.querySelector('#colorClose').onclick = ()=>{ overlay.remove(); saveAndRender(); };
  overlay.onclick = (e)=>{ if(e.target===overlay){ overlay.remove(); saveAndRender(); } };
}
function openQrModal(){
  if(!isAdmin) return;
  const homeUrl = location.origin + location.pathname;
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px;padding:22px;width:100%;max-width:340px;text-align:center;position:relative;';
  box.innerHTML = `
    <button id="qrXClose" style="position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%; border:none; background:var(--pale); color:var(--teal); font-size:16px; font-weight:800; line-height:1;">&times;</button>
    <h3 style="font-size:16px; margin-bottom:4px;">Scan to Open Hero Volley</h3>
    <div class="small-muted" style="margin-bottom:14px;">Have someone at the desk scan this to pull up the tournament on their own phone.</div>
    <div id="qrCanvasWrap" style="display:flex; justify-content:center; margin-bottom:6px; min-height:180px; align-items:center;"></div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  const wrap = box.querySelector('#qrCanvasWrap');
  if(typeof QRCode === 'undefined'){ wrap.innerHTML = `<div class="small-muted">QR library unavailable right now. Link: ${esc(homeUrl)}</div>`; }
  else{
    try{ new QRCode(wrap, { text:homeUrl, width:180, height:180, colorDark:'#0B4A4F', colorLight:'#ffffff' }); }
    catch(e){ wrap.innerHTML = `<div class="small-muted">Couldn't render QR. Link: ${esc(homeUrl)}</div>`; }
  }

  function closeAndGoHome(){
    overlay.remove();
    openTeam = null;
    activeTab = 'pools';
    history.pushState('', document.title, location.pathname + location.search);
    render();
  }
  box.querySelector('#qrXClose').onclick = closeAndGoHome;
  overlay.onclick = (e)=>{ if(e.target===overlay) closeAndGoHome(); };
}
function openScoreModal(matchId, isPlayoff){
  const m = isPlayoff ? state.playoffs.find(p=>p.id===matchId) : state.matches.find(p=>p.id===matchId);
  if(!m) return;
  if(isPlayoff) resolvePlayoffTeams(m);
  const ta = findTeam(isPlayoff? m.teamA_resolved : m.teamA);
  const tb = findTeam(isPlayoff? m.teamB_resolved : m.teamB);
  const ruleText = isPlayoff
    ? (m.format==='bo3' ? `Best of 3 &middot; sets 1&amp;2 to ${(m.setCaps&&m.setCaps[0])||21}, set 3 to ${(m.setCaps&&m.setCaps[2])||15}` : 'First to 21 · no cap')
    : 'First to 21 · win by 1 · capped at 21';
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;';

  function bo3Rows(){
    const dis = m.locked ? 'disabled' : '';
    return m.sets.map((s,i)=>{
      const setCap = (m.setCaps && m.setCaps[i]) || 21;
      return `
      <div style="display:flex;align-items:center;gap:10px;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
        <span style="font-size:12px;color:#6d8d8e;width:60px;">Set ${i+1} <span style="opacity:.6;">(to ${setCap})</span></span>
        <div class="scorebox"><button class="scorebtn" data-set="${i}" data-side="a" data-d="-1" ${dis}>−</button><input type="number" inputmode="numeric" class="set-score-input" data-set="${i}" data-side="a" value="${s.a}" ${dis}><button class="scorebtn" data-set="${i}" data-side="a" data-d="1" ${dis}>+</button></div>
        <span style="font-size:11px;color:#9db3b3;">vs</span>
        <div class="scorebox"><button class="scorebtn" data-set="${i}" data-side="b" data-d="-1" ${dis}>−</button><input type="number" inputmode="numeric" class="set-score-input" data-set="${i}" data-side="b" value="${s.b}" ${dis}><button class="scorebtn" data-set="${i}" data-side="b" data-d="1" ${dis}>+</button></div>
      </div>`;
    }).join('');
  }

  function lockLabel(){ return m.locked ? '&#128274; Unlock scoring' : '&#128275; Lock scoring'; }

  box.innerHTML = `
    <div style="width:38px;height:4px;background:#e5e5e5;border-radius:3px;margin:0 auto 14px;"></div>
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
      <div>
        <h3 style="font-size:16px;margin-bottom:2px;">${isPlayoff? esc(m.label) : poolLabel(m.pool)}</h3>
        <div class="small-muted">${esc(m.time||'')} &middot; ${esc(m.court||'')} &middot; ${ruleText}</div>
      </div>
      <button class="btn ghost small" id="lockBtn" style="white-space:nowrap;">${lockLabel()}</button>
    </div>
    <div style="font-weight:700; margin:14px 0 10px;">
      ${ta?`<span class="dot" style="background:${ta.color};display:inline-block;margin-right:6px;"></span>${esc(ta.name)}`:'TBD'}
      &nbsp;vs&nbsp;
      ${tb?`<span class="dot" style="background:${tb.color};display:inline-block;margin-right:6px;"></span>${esc(tb.name)}`:'TBD'}
    </div>
    <div id="scoreArea">
      ${m.format==='bo3' ? bo3Rows() : `
        <div style="display:flex;align-items:center;justify-content:space-around;padding:14px 0;">
          <div class="scorebox"><button class="scorebtn" data-simple="a" data-d="-1" ${m.locked?'disabled':''}>−</button><input type="number" inputmode="numeric" id="simpleA" class="score-num" style="font-size:34px;width:60px;text-align:center;" value="${m.scoreA}" ${m.locked?'disabled':''}><button class="scorebtn" data-simple="a" data-d="1" ${m.locked?'disabled':''}>+</button></div>
          <span style="color:#9db3b3;">vs</span>
          <div class="scorebox"><button class="scorebtn" data-simple="b" data-d="-1" ${m.locked?'disabled':''}>−</button><input type="number" inputmode="numeric" id="simpleB" class="score-num" style="font-size:34px;width:60px;text-align:center;" value="${m.scoreB}" ${m.locked?'disabled':''}><button class="scorebtn" data-simple="b" data-d="1" ${m.locked?'disabled':''}>+</button></div>
        </div>`}
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px;">
      <input type="checkbox" id="completeToggle" ${m.completed?'checked':''} ${m.locked?'disabled':''}> Mark this match Final (locks result into standings/bracket)
    </label>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn ghost" id="closeModal" style="flex:1;">Close</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function syncSimple(){
    document.getElementById('simpleA').value = m.scoreA;
    document.getElementById('simpleB').value = m.scoreB;
  }
  function bindSimple(){
    box.querySelectorAll('[data-simple]').forEach(btn=>{
      btn.onclick = ()=>{
        if(m.locked) return;
        const d = +btn.dataset.d;
        const cap = isPlayoff ? Infinity : 21;
        if(btn.dataset.simple==='a') m.scoreA = Math.max(0, Math.min(cap, m.scoreA+d));
        else m.scoreB = Math.max(0, Math.min(cap, m.scoreB+d));
        syncSimple(); persist(); render();
      };
    });
    const sA = document.getElementById('simpleA'), sB = document.getElementById('simpleB');
    if(sA) sA.onchange = ()=>{
      if(m.locked) return;
      const cap = isPlayoff ? Infinity : 21;
      let v = parseInt(sA.value,10); if(isNaN(v)) v=0;
      m.scoreA = Math.max(0, Math.min(cap, v)); persist(); render();
    };
    if(sB) sB.onchange = ()=>{
      if(m.locked) return;
      const cap = isPlayoff ? Infinity : 21;
      let v = parseInt(sB.value,10); if(isNaN(v)) v=0;
      m.scoreB = Math.max(0, Math.min(cap, v)); persist(); render();
    };
  }
  bindSimple();
  function rebindBo3(){
    box.querySelectorAll('.scorebtn[data-set]').forEach(btn=>{
      btn.onclick = ()=>{
        if(m.locked) return;
        const si = +btn.dataset.set, side = btn.dataset.side, d = +btn.dataset.d;
        const setCap = (m.setCaps && m.setCaps[si]) || 21;
        m.sets[si][side] = Math.max(0, Math.min(setCap, m.sets[si][side]+d));
        box.querySelector('#scoreArea').innerHTML = bo3Rows();
        rebindBo3();
        persist(); render();
      };
    });
    box.querySelectorAll('.set-score-input').forEach(inp=>{
      inp.onchange = ()=>{
        if(m.locked) return;
        const si = +inp.dataset.set, side = inp.dataset.side;
        const setCap = (m.setCaps && m.setCaps[si]) || 21;
        let v = parseInt(inp.value,10); if(isNaN(v)) v=0;
        m.sets[si][side] = Math.max(0, Math.min(setCap, v));
        persist(); render();
      };
    });
  }
  rebindBo3();
  document.getElementById('completeToggle').onchange = e=>{ if(!m.locked){ m.completed = e.target.checked; persist(); render(); } };
  document.getElementById('lockBtn').onclick = ()=>{
    m.locked = !m.locked;
    persist(); render();
    overlay.remove();
    openScoreModal(matchId, isPlayoff);
  };
  document.getElementById('closeModal').onclick = ()=>{ overlay.remove(); saveAndRender(); };
  overlay.onclick = (e)=>{ if(e.target===overlay){ overlay.remove(); saveAndRender(); } };
}

/* ---------- boot ---------- */
(async function(){
  document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:#0E7C86;font-family:Inter;">Loading Hero Volley Pro-Am…</div>';
  await loadState();
  const hashMatch = location.hash.match(/^#team=(.+)$/);
  if(hashMatch){
    const teamId = decodeURIComponent(hashMatch[1]);
    if(findTeam(teamId)) openTeam = teamId;
  }
  render();

  // poll for changes made on other devices — every few seconds, so it stays close to live
  setInterval(async ()=>{
    if(document.hidden || saveTimer || openTeam) return;
    try{
      const { data, error } = await supabase.from('hero_volley_state').select('data').eq('id', STATE_ROW_ID).maybeSingle();
      if(error) throw error;
      // CRITICAL: re-check AFTER the fetch resolves — a save or roster edit may have started
      // while this request was in flight, and applying a stale server copy now would wipe it out.
      if(saveTimer || openTeam) return;
      if(Date.now() - lastSaveCompletedAt < 5000) return; // our own save just landed; this response predates it
      if(data && data.data && JSON.stringify(data.data) !== JSON.stringify(state)){
        state = data.data; render();
      }
    }catch(e){}
  }, 4000);
})();
</script>
