<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Volley Montauk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --deep: #0B4A4F;
  --teal: #0E7C86;
  --cyan: #22B8C4;
  --light: #8FE9EE;
  --pale: #EAFBFA;
  --sand: #FBF8F1;
  --ink: #0A2E30;
  --line: #D7E9E8;
  --win: #1FA35C;
  --warn: #E0A100;
  --white: #ffffff;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--sand);color:var(--ink);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
body{padding-bottom:70px;}
h1,h2,h3{font-family:'Oswald',sans-serif; margin:0;}
.score-num{font-family:'Archivo Black',sans-serif;}
button{font-family:'Inter',sans-serif; cursor:pointer;}
input,select{font-family:'Inter',sans-serif;}

/* Top bar */
.topbar{position:sticky; top:0; z-index:50; background:linear-gradient(120deg,var(--deep),var(--teal) 65%,var(--cyan)); color:#fff; padding:14px 16px 12px; box-shadow:0 4px 14px rgba(11,74,79,.25);}
.topbar-row{display:flex; align-items:center; gap:10px;}
.header-qr{flex:0 0 auto; width:56px; height:56px; background:#fff; border-radius:8px; padding:4px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.2);}
.back-brand-btn{flex:1; text-align:left; background:none; border:none; color:#fff; font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:.02em; padding:2px 0; display:flex; align-items:center; gap:6px;}
.back-brand-btn::before{content:'\2039'; font-size:22px; font-weight:700; opacity:.8;}
.app-footer{text-align:center; font-size:11px; color:#9db3b3; padding:18px 0 28px; letter-spacing:.02em;}
.app-footer strong{color:var(--teal); font-weight:800;}
.brand{display:flex; flex-direction:column; line-height:1.05; flex:1; min-width:0;}
.brand h1{font-size:20px; letter-spacing:.02em; font-weight:600;}
.event-location{font-style:italic; font-weight:400; font-size:0.75em; opacity:.8; margin-left:2px;}
.tabbar{display:flex; gap:4px; margin-top:12px; overflow-x:auto; padding-bottom:2px;}
.tab-btn{flex:0 0 auto; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; padding:7px 13px; border-radius:20px; font-size:12.5px; font-weight:600; letter-spacing:.02em; white-space:nowrap;}
.tab-btn.active{background:#fff; color:var(--deep); border-color:#fff;}
.divtoggle{display:flex; gap:6px; margin-top:12px;}
.div-btn{flex:1; border:2px solid rgba(255,255,255,.5); background:rgba(255,255,255,.08); color:#fff; padding:10px 4px; border-radius:11px; font-family:'Oswald'; font-size:13px; font-weight:600; letter-spacing:.01em; text-transform:uppercase; white-space:nowrap;}
.div-btn.on{background:#fff; color:var(--deep); border-color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.15);}
.div-btn .n{display:block; font-size:9px; letter-spacing:.14em; opacity:.7; font-weight:600; text-transform:uppercase; margin-top:1px;}
.div-btn.on .n{opacity:.55;}

.wrap{max-width:900px; margin:0 auto; padding:14px;}

/* Cards */
.card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(11,74,79,.06);}
.section-title{font-size:11px; text-transform:uppercase; letter-spacing:.14em; font-weight:700; color:var(--teal); margin-bottom:8px;}
.pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.pill.live{background:#FFE7E0; color:#C5461F;}
.pill.final{background:#E4F7EA; color:var(--win);}
.pill.upcoming{background:var(--pale); color:var(--teal);}

/* Match card */
.match{border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; background:#fff;}
.match-head{display:flex; justify-content:space-between; align-items:center; font-size:11.5px; color:#5b7a7c; margin-bottom:6px; gap:8px; flex-wrap:wrap;}
.mc-inline{border:1px solid transparent; background:transparent; border-radius:6px; padding:2px 5px; font-size:11.5px; color:#5b7a7c; font-family:'Inter'; width:64px;}

/* BOMB-style inline live scorecard */
.scorecard{background:linear-gradient(160deg,var(--deep),var(--teal) 75%); border-radius:16px; padding:14px 15px; color:#fff; margin-bottom:10px; box-shadow:0 3px 10px rgba(11,74,79,.18);}
.scorecard-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px;}
.scorecard-head .meta{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
.mc-inline-dark{border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.08); border-radius:6px; padding:3px 7px; font-size:12px; color:#fff; font-family:'Inter'; width:64px;}
.mc-inline-dark:hover, .mc-inline-dark:focus{background:rgba(255,255,255,.18); outline:none;}
.scorecard-badge{padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap;}
.scorecard-badge.upcoming{background:rgba(255,255,255,.16); color:#fff;}
.scorecard-badge.live{background:#FFE7E0; color:#C5461F;}
.scorecard-badge.final{background:#E4F7EA; color:var(--win);}
.scorecard-team{display:flex; justify-content:space-between; align-items:center; padding:8px 0;}
.tbd-inline{font-style:italic; opacity:.7; font-weight:500;}
.scoreboard-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.sb-court{background:linear-gradient(160deg,var(--deep),var(--teal) 75%); border-radius:12px; padding:9px 10px; color:#fff; box-shadow:0 2px 6px rgba(11,74,79,.2);}
.sb-court-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:1px;}
.sb-court-name{font-family:'Oswald',sans-serif; font-size:12.5px; font-weight:700; letter-spacing:.02em;}
.sb-label{font-size:9px; opacity:.75; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sb-team{display:flex; justify-content:space-between; align-items:center; padding:3px 0;}
.sb-team .nm{display:flex; align-items:center; gap:5px; font-weight:600; font-size:11.5px; min-width:0;}
.sb-team .nm .dot{width:9px; height:9px;}
.sb-team .nm .tn{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sb-score{font-family:'Archivo Black',sans-serif; font-size:17px; flex:0 0 auto; margin-left:6px;}
.sb-vs{text-align:center; opacity:.5; font-size:7.5px; letter-spacing:.14em; border-top:1px solid rgba(255,255,255,.18); padding-top:3px;}
.sb-empty{opacity:.7; font-style:italic; text-align:center; padding:14px 0; font-size:11px;}
.sb-court .scorecard-badge{padding:2px 7px; font-size:9px;}
.scorecard-team .nm{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14.5px; min-width:0;}
.scorecard-team .nm span.tn{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.scorecard-controls{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
.scorecard-btn{width:32px; height:32px; border-radius:9px; border:none; font-size:19px; font-weight:700; line-height:1;}
.scorecard-btn.minus{background:rgba(255,255,255,.16); color:#fff;}
.scorecard-btn.plus{background:var(--cyan); color:var(--deep);}
.scorecard-score{font-family:'Archivo Black',sans-serif; font-size:22px; min-width:30px; text-align:center;}
.scorecard-vs{text-align:center; opacity:.5; font-size:10px; letter-spacing:.2em; margin:0; border-top:1px solid rgba(255,255,255,.18); padding-top:6px;}
.scorecard-note{font-size:11px; opacity:.75; margin-top:8px;}
.scorecard-final-toggle{display:flex; align-items:center; gap:7px; font-size:11.5px; opacity:.85; margin-top:10px;}
.interlude{background:var(--pale); border:1.5px dashed var(--cyan); border-radius:12px; padding:10px 12px; margin:2px 0 10px; display:flex; align-items:center; gap:10px;}
.interlude.lunch{background:#FFF6E0; border-color:#F0D584;}
.interlude .ico{font-size:18px; flex:0 0 auto;}
.interlude-name{flex:1; min-width:0; border:none; background:transparent; font-weight:700; font-size:13.5px; color:var(--teal); padding:4px 6px; border-radius:6px;}
.interlude-name:hover, .interlude-name:focus{background:rgba(255,255,255,.6); outline:none;}
.interlude.lunch .interlude-name{color:#8A6300;}
.interlude-time{width:76px; flex:0 0 auto; border:1px solid var(--line); border-radius:6px; padding:5px 6px; font-size:12px; text-align:center; background:#fff; color:#5b7a7c;}
.mc-inline:hover, .mc-inline:focus{border-color:var(--line); background:var(--pale); outline:none;}
.subtab-row{display:flex; gap:8px; margin-bottom:12px;}
.subtab-btn{flex:1; background:var(--pale); border:1.5px solid var(--line); color:var(--teal); padding:9px 8px; border-radius:10px; font-weight:700; font-size:13px; letter-spacing:.02em;}
.subtab-btn.on{background:var(--teal); border-color:var(--teal); color:#fff;}
.pool-name-input{border:none; border-bottom:1.5px dashed var(--line); background:transparent; font-family:'Oswald',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:.1em; font-weight:700; color:var(--teal); padding:2px 2px 5px; max-width:100%;}
.pool-name-input:hover{border-bottom-color:var(--cyan);}
.pool-name-input:focus{outline:none; border-bottom-color:var(--teal); background:var(--pale);}
.pool-name-suffix{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:#9db3b3; font-weight:600;}
.match-head .meta{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.teamrow{display:flex; align-items:center; justify-content:space-between; padding:6px 0; gap:8px;}
.teamname{display:flex; align-items:center; gap:8px; font-weight:600; font-size:14.5px; min-width:0;}
.teamname span.tn{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.dot{width:13px; height:13px; border-radius:50%; flex:0 0 auto; border:1px solid rgba(0,0,0,.08);}
.scorebox{display:flex; align-items:center; gap:6px;}
.scorebtn{width:26px; height:26px; border-radius:7px; border:1px solid var(--line); background:var(--pale); font-size:16px; font-weight:700; color:var(--teal); line-height:1;}
.scoreval{min-width:30px; text-align:center; font-size:19px; font-weight:800;}
.vs{text-align:center; font-size:10px; color:#9db3b3; letter-spacing:.1em; margin:2px 0;}
.match-actions{display:flex; gap:8px; margin-top:8px; justify-content:flex-end;}
.btn{border:none; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; letter-spacing:.02em;}
.btn.primary{background:var(--teal); color:#fff;}
.btn.ghost{background:var(--pale); color:var(--teal);}
.btn.danger{background:#FDEDEA; color:#C5461F;}
.btn.small{padding:4px 9px; font-size:11px;}

/* Standings table */
table.standings{width:100%; border-collapse:collapse; font-size:13px;}
table.standings th{text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#6d8d8e; padding:5px 6px; border-bottom:2px solid var(--line);}
table.standings td{padding:7px 6px; border-bottom:1px solid var(--line);}
table.standings tr:last-child td{border-bottom:none;}
.rank{font-weight:800; color:var(--teal); width:18px; display:inline-block;}

/* Bracket */


/* Teams editor */
.team-edit-card{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;}
.te-top{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.te-top input[type=text]{flex:1; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:14px; font-weight:700;}
.swatch{width:34px; height:34px; border-radius:8px; border:1px solid var(--line); padding:0; flex:0 0 auto;}
.swatch-row{display:flex; gap:7px; margin:2px 0 4px;}
.preset-swatch{width:24px; height:24px; border-radius:50%; border:1px solid rgba(0,0,0,.1); padding:0;}
.team-btn-row{display:flex; flex-direction:column; gap:8px;}
.team-row-pair{display:flex; align-items:center; gap:8px;}
.team-select-btn{flex:1; display:flex; align-items:center; gap:8px; text-align:left; background:var(--pale); border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font-weight:700; font-size:14px; color:var(--ink);}
.team-select-btn .dot{flex:0 0 auto;}
.color-edit-btn{flex:0 0 auto; width:38px; height:38px; border-radius:10px; border:1.5px solid var(--line); padding:0;}
.roster-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.roster-grid input{border:1px solid var(--line); border-radius:7px; padding:6px 8px; font-size:12.5px;}
.team-edit-card.on-color{border:none;}
.team-edit-card.on-color .te-top input[type=text],
.team-edit-card.on-color .roster-grid input{background:rgba(255,255,255,.92); color:#0A2E30; border-color:rgba(255,255,255,.5);}
.team-edit-card.on-color .roster-grid input::placeholder{color:#8fa3a3;}
.roster-toggle{font-size:12px; color:var(--teal); font-weight:700; margin-top:6px; display:inline-block;}
details.roster-details{margin-top:4px;}
details.roster-details summary{font-size:12px; font-weight:700; color:var(--teal); cursor:pointer; list-style:none;}
details.roster-details summary::-webkit-details-marker{display:none;}

/* Schedule editor row */
.sched-row{display:grid; grid-template-columns:70px 1fr 90px auto; gap:6px; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);}
.sched-row:last-child{border-bottom:none;}
.sched-row input[type=text], .sched-row input[type=time]{border:1px solid var(--line); border-radius:7px; padding:6px 7px; font-size:12px; width:100%;}
.sched-row select{border:1px solid var(--line); border-radius:7px; padding:6px 4px; font-size:12px; width:100%;}
.matchup-label{font-size:12.5px; font-weight:600;}

/* Live board / projector mode */

.reset-link{color:#C5461F; font-size:12px; font-weight:700; background:none; border:none; text-decoration:underline; padding:0;}
.small-muted{font-size:11px; color:#7f9a9b;}
.flag{background:#FFF6E0; border:1px solid #F0D584; color:#8A6300; font-size:11.5px; border-radius:8px; padding:8px 10px; margin-bottom:10px;}
.round-banner{display:flex; align-items:center; gap:8px; padding:9px 14px; border-radius:10px; font-family:'Oswald',sans-serif; font-weight:700; font-size:13px; letter-spacing:.08em; text-transform:uppercase; margin:4px 0 10px; color:#fff;}
.round-banner.qf{background:linear-gradient(90deg,var(--teal),var(--cyan));}
.round-banner.sf{background:linear-gradient(90deg,var(--deep),var(--teal));}
.round-banner.final{background:linear-gradient(90deg,#B8860B,#E0A100);}
.champ-banner{background:linear-gradient(135deg,#E0A100,#F4C430); border-radius:14px; padding:18px; text-align:center; margin:6px 0 4px; color:#3d2b00; box-shadow:0 4px 14px rgba(224,161,0,.35);}
.champ-banner .trophy{font-size:32px; line-height:1;}
.champ-banner .label{font-size:11px; text-transform:uppercase; letter-spacing:.12em; opacity:.75; font-weight:700; margin-top:4px;}
.champ-banner .name{font-family:'Oswald',sans-serif; font-size:21px; font-weight:700; margin-top:4px;}
</style>
</head>

}
function mkPool(id,time,court,pool,teamA,teamB,work){

function pomatch(id,time,court,label,seedA,seedB,format,opts){

/* ---------- persistence ---------- */
async function loadState(){
  for(let attempt=0; attempt<3; attempt++){
    try{
      const { data, error } = await supabase.from('hero_volley_state').select('data').eq('id', STATE_ROW_ID).maybeSingle();
      if(error) throw error;
      if(data && data.data){ state = data.data; }
      break;
    }catch(e){ console.warn('Load attempt failed, retrying...', e); await new Promise(r=>setTimeout(r,400)); }
  }
  if(!state){ state = defaultState(); await persist(); }
  if(state.eventName==='Hero Volley Montauk'){ state.eventName = 'Hero Volley Pro-Am'; }
  if(!state.eventLocation){ state.eventLocation = 'Montauk, NY'; }
  if(!state.qrLink){ state.qrLink = 'https://thesandclubacademy.com'; }
  if(!state.poolNames){ state.poolNames = { am1:'Pool 1', am2:'Pool 2', pro:'Pro Pool' }; }
  if(!state.proInterludes){
    state.proInterludes = [
      { id:'pi-1', type:'contest', name:'Game / Contest', time:'', afterRound:1 },
      { id:'pi-2', type:'contest', name:'Game / Contest', time:'', afterRound:2 },
      { id:'pi-lunch', type:'lunch', name:'Lunch', time:'12:30 PM', afterRound:3 },
      { id:'pi-3', type:'contest', name:'Game / Contest', time:'', afterRound:3 },
      { id:'pi-4', type:'contest', name:'Game / Contest', time:'', afterRound:4 },
    ];
  }
  // fix a seeding bug from an earlier version: SF1 (seed 1) should face the 4v5 winner, SF2 (seed 2) the 3v6 winner
  const sf1 = state.playoffs && state.playoffs.find(p=>p.id==='proSF1');
  const sf2 = state.playoffs && state.playoffs.find(p=>p.id==='proSF2');
  if(sf1 && sf1.seedB && sf1.seedB.of==='proQF1'){ sf1.seedB = {type:'winner',of:'proQF2'}; sf1.label='Pro Semifinal (1 vs 4/5)'; }
  if(sf2 && sf2.seedB && sf2.seedB.of==='proQF2'){ sf2.seedB = {type:'winner',of:'proQF1'}; sf2.label='Pro Semifinal (2 vs 3/6)'; }
  // scoring format: QF/SF play to 25 win-by-2 cap 30 (single score, same widget as pool play); Final is best of 3 (21/21/15)
  ['proQF1','proQF2','proSF1','proSF2'].forEach(id=>{
    const m = state.playoffs && state.playoffs.find(p=>p.id===id);
    if(m){ m.format='single'; m.cap=30; m.target=25; m.winBy=2; }
  });
  const fin = state.playoffs && state.playoffs.find(p=>p.id==='proFinal');
  if(fin){ fin.format='bo3'; fin.setCaps = [21,21,15]; if(!fin.sets) fin.sets=[{a:0,b:0},{a:0,b:0},{a:0,b:0}]; }
}
let consecutiveSaveFailures = 0;
let suppressNextRealtimeEcho = false;
function persist(){
  clearTimeout(saveTimer);
  return new Promise(resolve=>{
    saveTimer = setTimeout(async ()=>{
      let ok = false;
      for(let attempt=0; attempt<3 && !ok; attempt++){
        try{
          suppressNextRealtimeEcho = true;
          const { error } = await supabase.from('hero_volley_state').upsert({ id: STATE_ROW_ID, data: state, updated_at: new Date().toISOString() });
          if(error) throw error;
          ok = true; consecutiveSaveFailures = 0;
        }
        catch(e){ if(attempt<2) await new Promise(r=>setTimeout(r,400)); else { consecutiveSaveFailures++; console.warn('Save failed after retries', e); } }
      }
      saveTimer = null;
      resolve();
    }, 300);
  });
}
async function saveAndRender(){ await persist(); render(); }

/* ---------- helpers ---------- */
function allTeams(){ return [...state.teams.am1, ...state.teams.am2, ...state.teams.pro]; }
function findTeam(id){ return allTeams().find(t=>t.id===id) || null; }
function findMatch(id){ return state.matches.find(m=>m.id===id) || state.playoffs.find(m=>m.id===id) || null; }

function poolStandings(poolKey){
  const teams = state.teams[poolKey];
  const rows = teams.map(t=>({team:t, w:0,l:0,pf:0,pa:0,played:0}));
  state.matches.filter(m=>m.pool===poolKey && m.completed).forEach(m=>{
    const ra = rows.find(r=>r.team.id===m.teamA), rb = rows.find(r=>r.team.id===m.teamB);
    if(!ra||!rb) return;
    ra.pf+=m.scoreA; ra.pa+=m.scoreB; rb.pf+=m.scoreB; rb.pa+=m.scoreA;
    ra.played++; rb.played++;
    if(m.scoreA>m.scoreB){ra.w++; rb.l++;} else if(m.scoreB>m.scoreA){rb.w++; ra.l++;}
  });
  rows.forEach(r=> r.diff = r.pf-r.pa );
  rows.sort((a,b)=> b.w-a.w || b.diff-a.diff || b.pf-a.pf );
  return rows;
}

function matchWinnerTeamId(m){
  if(!m || !m.completed) return null;
  if(m.format==='bo3'){
    let sa=0,sb=0;
    (m.sets||[]).forEach(s=>{ if(s.a>s.b) sa++; else if(s.b>s.a) sb++; });
    if(sa>=2) return m.teamA_resolved||null;
    if(sb>=2) return m.teamB_resolved||null;
    return null;
  }
  if(m.scoreA>m.scoreB) return m.teamA_resolved||null;
  if(m.scoreB>m.scoreA) return m.teamB_resolved||null;
  return null;
}

function ordinal(n){ return {1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th',6:'6th'}[n] || (n+'th'); }
function seedPlaceholder(seed){
  if(!seed) return 'TBD';
  if(seed.type==='pro') return `${ordinal(seed.rank)} place of ${poolLabel('pro')}`;
  if(seed.type==='am1') return `${ordinal(seed.rank)} place of ${poolLabel('am1')}`;
  if(seed.type==='am2') return `${ordinal(seed.rank)} place of ${poolLabel('am2')}`;
  if(seed.type==='winner'){
    if(seed.of==='amFinal') return '1st place of Amateur Pools';
    const src = state.playoffs.find(p=>p.id===seed.of);
    return src ? `Winner of ${src.label}` : 'TBD';
  }
  return 'TBD';
}
function nextRoundNote(matchId){
  const nxt = state.playoffs.find(p=>
    (p.seedA && p.seedA.type==='winner' && p.seedA.of===matchId) ||
    (p.seedB && p.seedB.type==='winner' && p.seedB.of===matchId)
  );
  if(!nxt) return '';
  const opponentSeed = (nxt.seedA && nxt.seedA.type==='winner' && nxt.seedA.of===matchId) ? nxt.seedB : nxt.seedA;
  return `Winner plays ${seedPlaceholder(opponentSeed)}`;
}
function poolComplete(poolKey){
  const ms = state.matches.filter(m=>m.pool===poolKey);
  return ms.length>0 && ms.every(m=>m.completed);
}
function resolveSeed(seed){
  if(!seed) return null;
  if(seed.type==='am1' || seed.type==='am2' || seed.type==='pro'){
    if(!poolComplete(seed.type)) return null;
    const st = poolStandings(seed.type);
    return st[seed.rank-1] ? st[seed.rank-1].team : null;
  }
  if(seed.type==='winner'){
    const m = state.playoffs.find(p=>p.id===seed.of);
    if(!m) return null;
    resolvePlayoffTeams(m);
    const winId = matchWinnerTeamId(m);
    return winId ? findTeam(winId) : null;
  }
  return null;
}
function resolvePlayoffTeams(m){
  const ta = resolveSeed(m.seedA), tb = resolveSeed(m.seedB);
  m.teamA_resolved = ta ? ta.id : null;
  m.teamB_resolved = tb ? tb.id : null;
}

      <div class="match-actions"><span class="small-muted" style="margin-right:auto;">${scoreDisp}</span>
        <button class="btn primary small" data-open-score="${m.id}" data-playoff="${isPlayoff?'1':'0'}">Enter Score</button>
      </div>
    </div>`;
  }

  function teamRow(t, side){
    const score = side==='A' ? m.scoreA : m.scoreB;
    const nameHtml = t
      ? `<span class="dot" style="background:${t.color}"></span><span class="tn">${esc(t.name)}</span>`
      : `<span class="tn tbd-inline">${isPlayoff?esc(seedPlaceholder(side==='A'?m.seedA:m.seedB)):'TBD'}</span>`;
    return `<div class="scorecard-team">
      <div class="nm">${nameHtml}</div>
      <div class="scorecard-controls">
        <button class="scorecard-btn minus" data-mid="${m.id}" data-side="${side}" data-d="-1">&minus;</button>
        <span class="scorecard-score">${score}</span>
        <button class="scorecard-btn plus" data-mid="${m.id}" data-side="${side}" data-d="1">+</button>
      </div>
    </div>`;
  }
  let ruleNote = '';
  if(m.cap && m.target){ ruleNote = `First to ${m.target}${m.winBy?` &middot; win by ${m.winBy}`:''} &middot; capped at ${m.cap}`; }
  else if(!isPlayoff && m.pool){ ruleNote = 'First to 21 &middot; win by 1 &middot; capped at 21'; }
  return `<div class="scorecard">
    <div class="scorecard-head">
      <div class="meta">
        <input type="text" class="mc-inline-dark mc-time-edit" data-mid="${m.id}" value="${esc(m.time||'')}" placeholder="Time">
        <input type="text" class="mc-inline-dark mc-court-edit" data-mid="${m.id}" value="${esc(m.court||'')}" placeholder="Court">
      </div>
      <span class="scorecard-badge ${statusClass}">${statusLabel}</span>
    </div>
    ${teamRow(ta,'A')}
    <div class="scorecard-vs">VS</div>
    ${teamRow(tb,'B')}
    ${ruleNote?`<div class="scorecard-note">${ruleNote}</div>`:''}
    ${work?`<div class="scorecard-note">${work}</div>`:''}
    ${isPlayoff&&nextRoundNote(m.id)?`<div class="scorecard-note">${esc(nextRoundNote(m.id))}</div>`:''}
    <label class="scorecard-final-toggle"><input type="checkbox" class="inline-complete-toggle" data-mid="${m.id}" ${m.completed?'checked':''}> Mark Final</label>
  </div>`;
}

    html += `<div class="card">

function hexLuminance(hex){
  hex = (hex||'#888888').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const lin = c => c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
}
function contrastTextColor(hex){ return hexLuminance(hex) > 0.45 ? '#0A2E30' : '#ffffff'; }
function teamEditorCard(t, pool){
  const textColor = contrastTextColor(t.color);
  return `<div class="team-edit-card on-color" data-team="${t.id}" data-pool="${pool}" style="background:${t.color}; color:${textColor};">
    <div class="te-top">

    </div>
  </div>`;
}

}

function openColorModal(teamId){
  const t = findTeam(teamId);
  if(!t) return;
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px;padding:22px;width:100%;max-width:320px;text-align:center;';
  box.innerHTML = `
    <h3 style="font-size:16px;margin-bottom:14px;">${esc(t.name)}'s color</h3>
    <input type="color" id="colorPickerInput" value="${t.color}" style="width:100%; height:54px; border:1px solid var(--line); border-radius:10px; margin-bottom:14px; padding:2px;">
    <div class="swatch-row" style="justify-content:center; margin-bottom:16px;">
      ${PRESET_COLORS.map(c=>`<button type="button" class="preset-swatch" data-color="${c}" style="background:${c}${c.toLowerCase()===t.color.toLowerCase()?';box-shadow:0 0 0 2px #fff,0 0 0 4px var(--deep)':''}"></button>`).join('')}
    </div>
    <button class="btn ghost" id="colorClose" style="width:100%;">Close</button>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  box.querySelector('#colorPickerInput').oninput = e=>{ t.color = e.target.value; persist(); };
  box.querySelector('#colorPickerInput').onchange = ()=> saveAndRender();
  box.querySelectorAll('.preset-swatch').forEach(sw=>{
    sw.onclick = ()=>{ t.color = sw.dataset.color; saveAndRender(); overlay.remove(); };
  });
  box.querySelector('#colorClose').onclick = ()=>{ overlay.remove(); saveAndRender(); };
  overlay.onclick = (e)=>{ if(e.target===overlay){ overlay.remove(); saveAndRender(); } };
}
function openQrModal(){
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px;padding:22px;width:100%;max-width:340px;text-align:center;';
  box.innerHTML = `
    <h3 style="font-size:16px;margin-bottom:4px;">Event QR Code</h3>
    <div class="small-muted" style="margin-bottom:14px;">Point this at whatever link people should scan — registration, standings, your site.</div>
    <div id="qrCanvasWrap" style="display:flex; justify-content:center; margin-bottom:14px; min-height:180px; align-items:center;"></div>
    <input type="text" id="qrLinkInput" class="pool-name-input" style="text-transform:none; letter-spacing:normal; font-family:'Inter'; width:100%; text-align:center; border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-bottom:12px;" value="${esc(state.qrLink||'')}" placeholder="https://...">
    <div style="display:flex; gap:8px;">
      <button class="btn ghost" id="qrClose" style="flex:1;">Close</button>
      <button class="btn primary" id="qrUpdate" style="flex:1;">Update Code</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function draw(url){
    const wrap = box.querySelector('#qrCanvasWrap');
    wrap.innerHTML = '';
    if(!url){ wrap.innerHTML = '<div class="small-muted">Add a link above to generate a code.</div>'; return; }
    if(typeof QRCode === 'undefined'){ wrap.innerHTML = `<div class="small-muted">QR library unavailable right now. Link: ${esc(url)}</div>`; return; }
    try{ new QRCode(wrap, { text:url, width:180, height:180, colorDark:'#0B4A4F', colorLight:'#ffffff' }); }
    catch(e){ wrap.innerHTML = `<div class="small-muted">Couldn't render QR. Link: ${esc(url)}</div>`; }
  }
  draw(state.qrLink);

  box.querySelector('#qrUpdate').onclick = ()=>{
    const val = box.querySelector('#qrLinkInput').value.trim();
    state.qrLink = val; draw(val); saveAndRender();
  };
  box.querySelector('#qrClose').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}
function openScoreModal(matchId, isPlayoff){
  const m = isPlayoff ? state.playoffs.find(p=>p.id===matchId) : state.matches.find(p=>p.id===matchId);
  if(!m) return;
  if(isPlayoff) resolvePlayoffTeams(m);
  const ta = findTeam(isPlayoff? m.teamA_resolved : m.teamA);
  const tb = findTeam(isPlayoff? m.teamB_resolved : m.teamB);
  const ruleText = isPlayoff
    ? (m.format==='bo3' ? `Best of 3 &middot; sets 1&amp;2 to ${(m.setCaps&&m.setCaps[0])||21}, set 3 to ${(m.setCaps&&m.setCaps[2])||15}` : 'First to 21 · no cap')
    : 'First to 21 · win by 1 · capped at 21';
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(10,46,48,.55);z-index:300;display:flex;align-items:flex-end;justify-content:center;';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;';

  function bo3Rows(){
    return m.sets.map((s,i)=>{
      const setCap = (m.setCaps && m.setCaps[i]) || 21;
      return `
      <div style="display:flex;align-items:center;gap:10px;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);">
        <span style="font-size:12px;color:#6d8d8e;width:60px;">Set ${i+1} <span style="opacity:.6;">(to ${setCap})</span></span>
        <div class="scorebox"><button class="scorebtn" data-set="${i}" data-side="a" data-d="-1">−</button><span class="scoreval">${s.a}</span><button class="scorebtn" data-set="${i}" data-side="a" data-d="1">+</button></div>
        <span style="font-size:11px;color:#9db3b3;">vs</span>
        <div class="scorebox"><button class="scorebtn" data-set="${i}" data-side="b" data-d="-1">−</button><span class="scoreval">${s.b}</span><button class="scorebtn" data-set="${i}" data-side="b" data-d="1">+</button></div>
      </div>`;
    }).join('');
  }

  box.innerHTML = `
    <div style="width:38px;height:4px;background:#e5e5e5;border-radius:3px;margin:0 auto 14px;"></div>
    <h3 style="font-size:16px;margin-bottom:2px;">${isPlayoff? esc(m.label) : poolLabel(m.pool)}</h3>
    <div class="small-muted" style="margin-bottom:14px;">${esc(m.time||'')} &middot; ${esc(m.court||'')} &middot; ${ruleText}</div>
    <div style="font-weight:700; margin-bottom:10px;">
      ${ta?`<span class="dot" style="background:${ta.color};display:inline-block;margin-right:6px;"></span>${esc(ta.name)}`:'TBD'}
      &nbsp;vs&nbsp;
      ${tb?`<span class="dot" style="background:${tb.color};display:inline-block;margin-right:6px;"></span>${esc(tb.name)}`:'TBD'}
    </div>
    <div id="scoreArea">
      ${m.format==='bo3' ? bo3Rows() : `
        <div style="display:flex;align-items:center;justify-content:space-around;padding:14px 0;">
          <div class="scorebox"><button class="scorebtn" data-simple="a" data-d="-1">−</button><span class="score-num" id="simpleA" style="font-size:34px;width:46px;text-align:center;display:inline-block;">${m.scoreA}</span><button class="scorebtn" data-simple="a" data-d="1">+</button></div>
          <span style="color:#9db3b3;">vs</span>
          <div class="scorebox"><button class="scorebtn" data-simple="b" data-d="-1">−</button><span class="score-num" id="simpleB" style="font-size:34px;width:46px;text-align:center;display:inline-block;">${m.scoreB}</span><button class="scorebtn" data-simple="b" data-d="1">+</button></div>
        </div>`}
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px;">
      <input type="checkbox" id="completeToggle" ${m.completed?'checked':''}> Mark this match Final (locks result into standings/bracket)
    </label>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn ghost" id="closeModal" style="flex:1;">Close</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  function syncSimple(){
    document.getElementById('simpleA').textContent = m.scoreA;
    document.getElementById('simpleB').textContent = m.scoreB;
  }
  box.querySelectorAll('[data-simple]').forEach(btn=>{
    btn.onclick = ()=>{
      const d = +btn.dataset.d;
      const cap = isPlayoff ? Infinity : 21;
      if(btn.dataset.simple==='a') m.scoreA = Math.max(0, Math.min(cap, m.scoreA+d));
      else m.scoreB = Math.max(0, Math.min(cap, m.scoreB+d));
      syncSimple(); persist(); render();
    };
  });
  box.querySelectorAll('.scorebtn[data-set]').forEach(btn=>{
    btn.onclick = ()=>{
      const si = +btn.dataset.set, side = btn.dataset.side, d = +btn.dataset.d;
      const setCap = (m.setCaps && m.setCaps[si]) || 21;
      m.sets[si][side] = Math.max(0, Math.min(setCap, m.sets[si][side]+d));
      box.querySelector('#scoreArea').innerHTML = bo3Rows();
      rebindBo3();
      persist(); render();
    };
  });
  function rebindBo3(){
    box.querySelectorAll('.scorebtn[data-set]').forEach(btn=>{
      btn.onclick = ()=>{
        const si = +btn.dataset.set, side = btn.dataset.side, d = +btn.dataset.d;
        const setCap = (m.setCaps && m.setCaps[si]) || 21;
        m.sets[si][side] = Math.max(0, Math.min(setCap, m.sets[si][side]+d));
        box.querySelector('#scoreArea').innerHTML = bo3Rows();
        rebindBo3();
        persist(); render();
      };
    });
  }
  document.getElementById('completeToggle').onchange = e=>{ m.completed = e.target.checked; persist(); render(); };
  document.getElementById('closeModal').onclick = ()=>{ overlay.remove(); saveAndRender(); };
  overlay.onclick = (e)=>{ if(e.target===overlay){ overlay.remove(); saveAndRender(); } };
}

/* ---------- boot ---------- */
(async function(){
  document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:#0E7C86;font-family:Inter;">Loading Hero Volley Pro-Am…</div>';
  await loadState();
  render();

  // realtime: instantly pick up edits made from any other phone/device
  supabase
    .channel('hero_volley_state_changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'hero_volley_state', filter:`id=eq.${STATE_ROW_ID}` }, (payload)=>{
      if(suppressNextRealtimeEcho){ suppressNextRealtimeEcho = false; return; }
      if(payload.new && payload.new.data){
        state = payload.new.data;
        render();
      }
    })
    .subscribe();

  // fallback poll in case realtime drops, so nothing ever goes stale for long
  setInterval(async ()=>{
    if(document.hidden || saveTimer) return;
    try{
      const { data, error } = await supabase.from('hero_volley_state').select('data').eq('id', STATE_ROW_ID).maybeSingle();
      if(error) throw error;
      if(data && data.data && JSON.stringify(data.data) !== JSON.stringify(state)){
        state = data.data; render();
      }
    }catch(e){}
  }, 15000);
})();
</script>
